<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 220px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #343541; color: #ECECF1; }
    h2 { margin: 0 0 16px 0; font-size: 16px; font-weight: 600; }
    .group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-size: 12px; color: #C5C5D2; }
    input[type="number"] { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #565869; background: #40414F; color: #fff; box-sizing: border-box; outline: none; transition: border 0.2s; }
    input[type="number"]:focus { border-color: #10a37f; }
    
    .row { display: flex; align-items: center; justify-content: space-between; }
    .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #565869; transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #10a37f; }
    input:checked + .slider:before { transform: translateX(16px); }

    .status { margin-top: 12px; font-size: 11px; color: #10a37f; text-align: center; min-height: 16px; opacity: 0; transition: opacity 0.3s; }
  </style>
</head>
<body>
  <h2>MCP Bridge Config</h2>
  
  <div class="group">
    <label for="port">Gateway Port</label>
    <input type="number" id="port" placeholder="3000">
  </div>

  <div class="group row">
    <label style="margin:0" for="autoSend">Auto Send</label>
    <label class="switch">
      <input type="checkbox" id="autoSend">
      <span class="slider"></span>
    </label>
  </div>

  <div id="status" class="status">Settings Saved!</div>
  <script src="popup.js"></script>
</body>
</html>
