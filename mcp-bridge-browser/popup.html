<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 240px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background: #343541;
        color: #ececf1;
      }
      h2 {
        margin: 0 0 16px 0;
        font-size: 16px;
        font-weight: 600;
      }
      .group {
        margin-bottom: 16px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        color: #c5c5d2;
      }
      input[type="number"] {
        width: 100%;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #565869;
        background: #40414f;
        color: #fff;
        box-sizing: border-box;
        outline: none;
        transition: border 0.2s;
      }
      input[type="number"]:focus {
        border-color: #10a37f;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .switch {
        position: relative;
        display: inline-block;
        width: 36px;
        height: 20px;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #565869;
        transition: 0.4s;
        border-radius: 34px;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 16px;
        width: 16px;
        left: 2px;
        bottom: 2px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
      }
      input:checked + .slider {
        background-color: #10a37f;
      }
      input:checked + .slider:before {
        transform: translateX(16px);
      }

      .status {
        margin-top: 12px;
        font-size: 11px;
        color: #10a37f;
        text-align: center;
        min-height: 16px;
        opacity: 0;
        transition: opacity 0.3s;
      }

      /* 按钮基础样式 */
      .btn-action {
        width: 100%;
        padding: 8px;
        background: #10a37f;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        margin-bottom: 8px;
        font-size: 12px;
        transition: background 0.2s;
      }
      .btn-action:hover {
        background: #0d8a6a;
      }
    </style>
  </head>
  <body>
    <h2>WebMCP Bridge Config</h2>

    <div class="group">
      <label for="extensionId">Extension ID (For Whitelist)</label>
      <div style="display: flex; align-items: stretch; ">
        <input
          type="text"
          id="extensionId"
          readonly
          style="
            flex: 1;
            background: #25262b;
            color: #8e8ea0;
            border: 1px solid #565869;
            border-right: none;
            border-radius: 6px 0 0 6px;
            padding: 8px;
            font-family: monospace;
            font-size: 11px;
            resize: none;
            outline: none;
            box-sizing: border-box;
            line-height: 1.4;
            overflow: hidden;
          "
        ></textarea>
        <button
          id="copyBtn"
          style="
            width: 50px;
            background: #40414f;
            color: white;
            border: 1px solid #565869;
            border-left: 1px solid #343541;
            border-radius: 0 6px 6px 0;
            cursor: pointer;
            font-size: 11px;
            padding: 0;
            transition: background 0.2s;
          "
        >
          Copy
        </button>
      </div>
    </div>

    <div class="group">
      <button id="copyPromptBtn" class="btn-action">Copy System Prompt</button>
    </div>

    <div class="group">
      <label for="port">Gateway Port</label>
      <input type="number" id="port" placeholder="34567" />
    </div>

    <div class="group row">
      <label style="margin: 0" for="autoSend">Auto Send</label>
      <label class="switch">
        <input type="checkbox" id="autoSend" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="group row">
      <label style="margin: 0" for="autoPrompt"
        >Auto Prompt (Fill initial)</label
      >
      <label class="switch">
        <input type="checkbox" id="autoPrompt" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="group row">
      <label style="margin: 0" for="showFloatingLog">Show Floating Log</label>
      <label class="switch">
        <input type="checkbox" id="showFloatingLog" />
        <span class="slider"></span>
      </label>
    </div>

    <div id="status" class="status">Settings Saved!</div>
    <script src="popup.js"></script>
  </body>
</html>
